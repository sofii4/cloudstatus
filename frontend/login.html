<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudStatus — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center font-sans">

  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
      <span class="text-4xl">☁️</span>
      <h1 class="text-2xl font-bold mt-3 tracking-tight">CloudStatus</h1>
      <p class="text-sm text-gray-500 mt-1">Acesso administrativo</p>
    </div>

    <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6">
      <div id="error-msg" class="hidden mb-4 text-sm text-red-400 bg-red-950 border border-red-800 rounded-lg px-4 py-3"></div>

      <form id="login-form" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 font-medium">Usuário</label>
          <input id="username" type="text" autocomplete="username" required
            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 font-medium">Senha</label>
          <input id="password" type="password" autocomplete="current-password" required
            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors" />
        </div>
        <button type="submit" id="btn-login"
          class="mt-1 w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center mt-6 text-xs text-gray-600">
      <a href="/" class="hover:text-gray-400 transition-colors">← Voltar ao painel público</a>
    </p>
  </div>

  <script>
    // Redireciona se já autenticado
    if (localStorage.getItem('cs_token')) {
      window.location.replace('/admin.html')
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('btn-login')
      const errEl = document.getElementById('error-msg')
      btn.disabled = true
      btn.textContent = 'Autenticando...'
      errEl.classList.add('hidden')

      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        })

        if (res.ok) {
          const data = await res.json()
          localStorage.setItem('cs_token', data.access_token)
          window.location.replace('/admin.html')
        } else {
          errEl.textContent = 'Usuário ou senha incorretos.'
          errEl.classList.remove('hidden')
        }
      } catch {
        errEl.textContent = 'Erro de conexão com o servidor.'
        errEl.classList.remove('hidden')
      } finally {
        btn.disabled = false
        btn.textContent = 'Entrar'
      }
    })
  </script>
</body>
</html>
