version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: cloudstatus_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudstatus_net

  redis:
    image: redis:7-alpine
    container_name: cloudstatus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudstatus_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudstatus_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cloudstatus_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudstatus_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - cloudstatus_net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: cloudstatus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cloudstatus_net

volumes:
  postgres_data:
  redis_data:

networks:
  cloudstatus_net:
    driver: bridge