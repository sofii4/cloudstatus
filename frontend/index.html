<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudStatus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .dot-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .history-bar { display:flex; gap:2px; align-items:center; }
    .history-bar span { display:inline-block; width:8px; height:20px; border-radius:2px; flex-shrink:0; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">☁️</span>
      <h1 class="text-xl font-bold tracking-tight">CloudStatus</h1>
    </div>
    <div class="flex items-center gap-4">
      <a href="/login.html" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">Admin →</a>
      <span id="last-updated" class="text-xs text-gray-500"></span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10">

    <!-- Banner global -->
    <div id="global-banner" class="rounded-xl px-6 py-4 mb-8 flex items-center justify-between transition-all duration-500 bg-gray-800">
      <div class="flex items-center gap-3">
        <span id="global-dot" class="w-3 h-3 rounded-full bg-gray-500 dot-pulse"></span>
        <span id="global-text" class="font-semibold text-lg">Carregando...</span>
      </div>
      <span id="global-count" class="text-sm text-gray-400"></span>
    </div>

    <!-- Incidentes ativos -->
    <div id="active-incidents-section" class="hidden mb-8">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Incidentes Ativos</h2>
      <div id="active-incidents" class="flex flex-col gap-2"></div>
    </div>

    <!-- Grid de serviços -->
    <div id="services-grid" class="flex flex-col gap-3"></div>

    <!-- Estado vazio -->
    <div id="empty-state" class="hidden text-center py-20 text-gray-600">
      <p class="text-5xl mb-4">📡</p>
      <p class="text-lg">Nenhum serviço monitorado ainda.</p>
      <p class="text-sm mt-1">Adicione serviços pela <a href="/login.html" class="text-indigo-400 hover:underline">área admin</a>.</p>
    </div>

    <!-- Histórico de incidentes -->
    <div id="incidents-section" class="hidden mt-12">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Histórico de Incidentes</h2>
      <div id="incidents-list" class="flex flex-col gap-2"></div>
    </div>

  </main>

  <footer class="text-center text-xs text-gray-700 py-6">CloudStatus — atualiza a cada 30s</footer>

  <script>
    const API = '/api'

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]))
    }

    function formatDuration(seconds) {
      if (!seconds) return ''
      const m = Math.floor(seconds / 60)
      const h = Math.floor(m / 60)
      if (h > 0) return `${h}h ${m % 60}m`
      return `${m}m`
    }

    function timeSince(isoStr) {
      const diff = Date.now() - new Date(isoStr).getTime()
      const m = Math.floor(diff / 60000)
      const h = Math.floor(m / 60)
      const d = Math.floor(h / 24)
      if (d > 0) return `há ${d}d`
      if (h > 0) return `há ${h}h`
      return `há ${m}m`
    }

    function renderHistoryBar(history) {
      if (!history || !history.length) {
        return `<div class="history-bar">${Array(30).fill('<span class="bg-gray-800"></span>').join('')}</div>`
      }
      // Pad to 30 from the left with gray
      const padded = Array(Math.max(0, 30 - history.length)).fill(null).concat(history)
      const bars = padded.map(e => {
        if (!e) return '<span class="bg-gray-800" title="Sem dado"></span>'
        const color = e.is_up ? 'bg-emerald-500' : 'bg-red-500'
        const ts = new Date(e.checked_at).toLocaleString('pt-BR')
        const status = e.is_up ? 'Operacional' : 'Indisponível'
        return `<span class="${color}" title="${status} — ${ts}"></span>`
      }).join('')
      return `<div class="history-bar">${bars}</div>`
    }

    async function fetchData() {
      try {
        const [statusRes, incidentsRes] = await Promise.all([
          fetch(`${API}/status`),
          fetch(`${API}/incidents`),
        ])
        const services = await statusRes.json()
        const incidents = await incidentsRes.json()

        renderServices(services)
        updateGlobalBanner(services)
        renderIncidents(incidents)

        document.getElementById('last-updated').textContent =
          'Atualizado: ' + new Date().toLocaleTimeString('pt-BR')
      } catch {
        document.getElementById('global-text').textContent = 'Erro ao carregar dados'
      }
    }

    function renderServices(services) {
      const grid = document.getElementById('services-grid')
      const empty = document.getElementById('empty-state')

      if (!services.length) {
        grid.innerHTML = ''
        empty.classList.remove('hidden')
        return
      }
      empty.classList.add('hidden')

      grid.innerHTML = services.map(svc => {
        const s = svc.current_status
        const isUp = s?.is_up
        const hasIncident = !!svc.open_incident
        const dotColor = isUp === undefined ? 'bg-gray-500' : isUp ? 'bg-emerald-400' : 'bg-red-500'
        const cardBorder = hasIncident ? 'border-red-900' : isUp === undefined ? 'border-gray-700' : isUp ? 'border-gray-700' : 'border-red-900'
        const label = hasIncident ? 'Incidente' : isUp === undefined ? 'Aguardando' : isUp ? 'Operacional' : 'Indisponível'
        const labelColor = hasIncident ? 'text-red-400' : isUp === undefined ? 'text-gray-400' : isUp ? 'text-emerald-400' : 'text-red-400'
        const uptime = svc.uptime_24h !== null && svc.uptime_24h !== undefined
          ? `<span class="text-xs ${svc.uptime_24h >= 99 ? 'text-emerald-500' : svc.uptime_24h >= 90 ? 'text-yellow-500' : 'text-red-500'}">${svc.uptime_24h}% (24h)</span>`
          : ''
        const tags = svc.tags ? svc.tags.split(',').map(t =>
          `<span class="text-xs bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded">${escapeHtml(t.trim())}</span>`
        ).join('') : ''

        return `
        <div class="bg-gray-900 border ${cardBorder} rounded-xl p-5 flex flex-col gap-3 transition-all duration-300">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 min-w-0">
              <span class="w-2.5 h-2.5 rounded-full shrink-0 ${dotColor} ${!isUp && isUp !== undefined ? '' : 'dot-pulse'}"></span>
              <span class="font-semibold text-sm truncate">${escapeHtml(svc.name)}</span>
              ${tags}
            </div>
            <span class="text-xs font-medium shrink-0 ml-2 ${labelColor}">${label}</span>
          </div>

          <p class="text-xs text-gray-500 truncate">${escapeHtml(svc.url)}</p>

          ${renderHistoryBar(svc.history)}

          <div class="flex items-center justify-between text-xs text-gray-500 pt-1 border-t border-gray-800">
            <div class="flex items-center gap-4">
              <span>⏱ ${s?.response_ms != null ? s.response_ms + ' ms' : '—'}</span>
              <span>HTTP ${s?.status_code ?? '—'}</span>
            </div>
            ${uptime}
          </div>
        </div>`
      }).join('')
    }

    function updateGlobalBanner(services) {
      const banner = document.getElementById('global-banner')
      const dot = document.getElementById('global-dot')
      const text = document.getElementById('global-text')
      const count = document.getElementById('global-count')
      const activeSection = document.getElementById('active-incidents-section')
      const activeList = document.getElementById('active-incidents')

      if (!services.length) {
        dot.className = 'w-3 h-3 rounded-full bg-gray-500'
        text.textContent = 'Nenhum serviço cadastrado'
        count.textContent = ''
        return
      }

      const withData = services.filter(s => s.current_status !== null)
      if (!withData.length) {
        dot.className = 'w-3 h-3 rounded-full bg-yellow-400 dot-pulse'
        text.textContent = 'Aguardando primeiro ciclo de monitoramento...'
        count.textContent = ''
        return
      }

      const upCount = withData.filter(s => s.current_status?.is_up).length
      const downCount = withData.length - upCount
      const activeIncidents = services.filter(s => s.open_incident)

      // Active incidents banner
      if (activeIncidents.length) {
        activeSection.classList.remove('hidden')
        activeList.innerHTML = activeIncidents.map(s => `
          <div class="flex items-center gap-3 bg-red-950 border border-red-900 rounded-lg px-4 py-3 text-sm">
            <span class="w-2 h-2 rounded-full bg-red-500 shrink-0"></span>
            <span class="font-medium">${escapeHtml(s.name)}</span>
            <span class="text-red-400 text-xs">${timeSince(s.open_incident.started_at)}</span>
          </div>`).join('')
      } else {
        activeSection.classList.add('hidden')
      }

      count.textContent = `${upCount}/${withData.length} operacionais`

      if (downCount === 0) {
        banner.className = 'rounded-xl px-6 py-4 mb-8 flex items-center justify-between bg-emerald-950 border border-emerald-800 transition-all duration-500'
        dot.className = 'w-3 h-3 rounded-full bg-emerald-400 dot-pulse'
        text.textContent = 'Todos os sistemas operacionais'
      } else {
        banner.className = 'rounded-xl px-6 py-4 mb-8 flex items-center justify-between bg-red-950 border border-red-900 transition-all duration-500'
        dot.className = 'w-3 h-3 rounded-full bg-red-500'
        text.textContent = `Degradação detectada em ${downCount} serviço${downCount > 1 ? 's' : ''}`
      }
    }

    function renderIncidents(incidents) {
      const section = document.getElementById('incidents-section')
      const list = document.getElementById('incidents-list')
      const resolved = incidents.filter(i => i.resolved_at)

      if (!resolved.length) {
        section.classList.add('hidden')
        return
      }
      section.classList.remove('hidden')
      list.innerHTML = resolved.slice(0, 5).map(i => `
        <div class="flex items-center gap-3 bg-gray-900 border border-gray-800 rounded-lg px-4 py-3 text-sm">
          <span class="w-2 h-2 rounded-full bg-gray-500 shrink-0"></span>
          <span class="font-medium text-gray-300">${escapeHtml(i.service_name)}</span>
          <span class="text-gray-500 text-xs">${new Date(i.started_at).toLocaleString('pt-BR')}</span>
          ${i.duration_seconds ? `<span class="ml-auto text-xs text-gray-600">${formatDuration(i.duration_seconds)}</span>` : ''}
        </div>`).join('')
    }

    fetchData()
    setInterval(fetchData, 30000)
  </script>
</body>
</html>
